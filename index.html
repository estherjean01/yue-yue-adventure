<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童互動繪本：黑熊月月的玉山冒險</title>
    <style>
        /* 全域樣式與森林系漸層背景 */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2e7d32;
        }

        /* 繪本外框卡片 */
        .story-container {
            background-color: #ffffff;
            max-width: 600px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.15);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            border: 4px solid #a5d6a7;
            transition: all 0.5s ease;
        }

        /* 繪本標題 */
        h1 {
            font-size: 26px;
            color: #1b5e20;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* --- 漫畫風說話泡泡對話框 --- */
        .chat-bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid #2d2421;
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #3e2723;
            display: inline-block;
            max-width: 80%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease;
        }

        /* 對話框左下角指向月月的小三角形 */
        .chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 12px 0 0;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            display: block;
            width: 0;
            z-index: 2;
        }
        /* 對話框小三角形的黑色邊框效果 */
        .chat-bubble::before {
            content: '';
            position: absolute;
            bottom: -19px;
            left: 28px;
            border-width: 16px 14px 0 0;
            border-style: solid;
            border-color: #2d2421 transparent transparent transparent;
            display: block;
            width: 0;
            z-index: 1;
        }

        /* --- 繪本風格插圖區塊 --- */
        .illustration-box {
            width: 100%;
            height: 260px;
            background: linear-gradient(to bottom, #e0f2f1 0%, #fff9c4 100%); /* 溫柔微光天空 */
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 讓月月坐在草地上 */
            border: 3px dashed #81c784;
        }

        /* 草地背景 */
        .scene-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: #81c784;
            z-index: 1;
            transition: background-color 0.5s ease;
        }

        /* 背景小樹裝飾 (左) */
        .tree-left {
            position: absolute;
            left: 30px;
            bottom: 45px;
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 60px solid #4caf50;
            z-index: 2;
        }
        .tree-left::before {
            content: '';
            position: absolute;
            left: -8px;
            bottom: -75px;
            width: 16px;
            height: 20px;
            background-color: #795548;
        }

        /* 背景小樹裝飾 (右) */
        .tree-right {
            position: absolute;
            right: 40px;
            bottom: 50px;
            width: 50px;
            height: 50px;
            background-color: #2e7d32;
            border-radius: 50%;
            z-index: 2;
        }
        .tree-right::before {
            content: '';
            position: absolute;
            left: 20px;
            bottom: -20px;
            width: 10px;
            height: 25px;
            background-color: #5d4037;
        }

        /* --- 台灣黑熊月月造型設計 --- */
        .bear-container {
            width: 130px;
            height: 150px;
            position: relative;
            z-index: 3;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        /* 熊身體 */
        .bear-body {
            width: 130px;
            height: 120px;
            background-color: #2d2421; /* 深棕黑色 */
            border-radius: 70px 70px 50px 50px;
            position: absolute;
            bottom: 0;
            overflow: hidden;
            transition: background-color 0.5s ease;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1);
        }

        /* 圓圓大耳朵 */
        .ear {
            width: 38px;
            height: 38px;
            background-color: #2d2421;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            transition: background-color 0.5s ease;
        }
        .ear.left { left: 5px; }
        .ear.right { right: 5px; }
        .ear::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #4e342e;
            border-radius: 50%;
            top: 9px;
            left: 9px;
        }

        /* 可愛五官群組 */
        .bear-face {
            position: absolute;
            width: 100%;
            height: 60px;
            top: 15px;
        }

        /* 亮晶晶圓眼睛 */
        .eye {
            width: 12px;
            height: 12px;
            background-color: #111;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .eye.left { left: 32px; }
        .eye.right { right: 32px; }
        .eye::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
        }

        /* 腮紅 */
        .blush {
            width: 14px;
            height: 8px;
            background-color: #ff8a80;
            border-radius: 50%;
            position: absolute;
            top: 28px;
            opacity: 0.8;
        }
        .blush.left { left: 22px; }
        .blush.right { right: 22px; }

        /* 鼻子 */
        .snout {
            width: 36px;
            height: 26px;
            background-color: #d7ccc8;
            border-radius: 50%;
            position: absolute;
            left: 47px;
            top: 25px;
            display: flex;
            justify-content: center;
        }
        .nose {
            width: 14px;
            height: 9px;
            background-color: #111;
            border-radius: 7px 7px 10px 10px;
            margin-top: 4px;
        }

        /* 台灣黑熊白色月牙斑 */
        .v-stripe {
            position: absolute;
            bottom: 12px;
            left: 25px;
            width: 80px;
            height: 40px;
            border-bottom: 14px solid #f5f5f5;
            border-radius: 0 0 50px 50px;
            box-sizing: border-box;
        }

        /* --- 故事文字區塊 --- */
        .story-text {
            font-size: 19px;
            color: #37474f;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .story-text p {
            margin: 0;
            margin-bottom: 12px;
            line-height: 2;
            font-weight: 500;
            text-align: left;
            padding: 0 5px;
            word-break: keep-all;
        }
        .story-text p:last-child {
            margin-bottom: 0;
        }

        /* SDG 宣導語專用區塊 */
        .sdg-slogan {
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            color: #1b5e20;
            margin-bottom: 25px;
            display: none;
            font-weight: bold;
            line-height: 1.6;
            animation: fadeIn 0.8s ease;
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-option-a { background-color: #ff9800; box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3); }
        .btn-option-a:hover { background-color: #f57c00; box-shadow: 0 6px 15px rgba(255, 152, 0, 0.4); }

        .btn-option-b { background-color: #4caf50; }
        .btn-option-b:hover { background-color: #388e3c; }

        .btn-reset { background-color: #78909c; display: none; }
        .btn-reset:hover { background-color: #607d8b; box-shadow: 0 6px 15px rgba(120, 144, 156, 0.4); }

        /* 動畫效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body>

    <div class="story-container">
        <!-- 繪本標題 -->
        <h1>黑熊月月的玉山冒險</h1>

        <!-- 角色對話框 -->
        <div>
            <div class="chat-bubble" id="chat-bubble">「我好餓……森林裡還有食物嗎？」</div>
        </div>

        <!-- 插圖區塊 -->
        <div class="illustration-box">
            <div class="tree-left"></div>
            <div class="tree-right"></div>
            <div class="scene-bg" id="scene-bg"></div>
            
            <!-- 台灣黑熊月月 -->
            <div class="bear-container" id="bear-character">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="bear-body" id="bear-body">
                    <div class="bear-face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="blush left"></div>
                        <div class="blush right"></div>
                        <div class="snout"><div class="nose"></div></div>
                    </div>
                    <div class="v-stripe"></div>
                </div>
            </div>
        </div>

        <!-- 故事文字區塊 -->
        <div class="story-text" id="story-text">
            <p>台灣黑熊「月月」住在美麗的玉山森林裡。</p>
            <p>但是最近森林棲地變得越來越小，月月找不到足夠的食物和藏身處。</p>
            <p>牠肚子好餓好餓，心裡充滿了害怕……該怎麼辦呢？</p>
        </div>

        <!-- SDG 宣導語 -->
        <div class="sdg-slogan" id="sdg-slogan"></div>

        <!-- 互動按鈕區 -->
        <div class="btn-group">
            <button class="btn btn-option-a" id="btn-a" onclick="chooseOption('A')">走進人類的農田找食物</button>
            <button class="btn btn-option-b" id="btn-b" onclick="chooseOption('B')">繼續深入森林尋找</button>
            <button class="btn btn-reset" id="btn-reset" onclick="resetStory()">📖 重讀故事</button>
        </div>
    </div>

    <script>
        const storyText = document.getElementById('story-text');
        const chatBubble = document.getElementById('chat-bubble');
        const sdgSlogan = document.getElementById('sdg-slogan');
        const btnA = document.getElementById('btn-a');
        const btnB = document.getElementById('btn-b');
        const btnReset = document.getElementById('btn-reset');
        
        const bearBody = document.getElementById('bear-body');
        const ears = document.querySelectorAll('.ear');
        const sceneBg = document.getElementById('scene-bg');

        // 重啟對話框動畫的輔助函式
        function triggerBubbleAnimation() {
            chatBubble.classList.remove('fade-in');
            void chatBubble.offsetWidth; 
            chatBubble.classList.add('fade-in');
        }

        function chooseOption(choice) {
            storyText.classList.remove('fade-in');
            void storyText.offsetWidth; 
            storyText.classList.add('fade-in');
            triggerBubbleAnimation();

            if (choice === 'A') {
                // 變更月月的心情對話
                chatBubble.innerText = "「我不應該去農田的……」";

                storyText.innerHTML = `
                    <p>月月無奈地走進了人類的農田，試圖翻找農作物果腹。</p>
                    <p>不幸的是，牠很快就被緊張的農夫發現，在慌亂逃跑時受了傷，最後被捕獲……</p>
                    <p>月月再也回不到牠那自由又美麗的森林家園了。</p>
                `;
                
                sdgSlogan.innerHTML = "💡 <strong>SDG 15 陸地生態保育：</strong><br>棲地消失是野生動物最大的威脅，保護森林就是保護牠們的家。";
                sdgSlogan.style.display = "block";
                
                updateBearColor('#757575'); // 受傷變灰
                sceneBg.style.backgroundColor = "#b0bec5";
                
            } else if (choice === 'B') {
                // 變更月月的心情對話
                chatBubble.innerText = "「原來森林裡還藏著這麼多寶藏！」";

                storyText.innerHTML = `
                    <p>月月堅持忍著飢餓，決定轉身繼續往更深、更遠的森林裡尋找。</p>
                    <p>走著走著，牠幸運地發現了一整片結滿成熟野果的祕境，還找到一個安全的大老樹洞！</p>
                    <p>月月學會了與大自然和諧共存，平安開心地度過了寒冷的冬天。</p>
                `;
                
                sdgSlogan.innerHTML = "💡 <strong>SDG 15 陸地生態保育：</strong><br>守護陸地生態，讓每一種生命都有安心生活的地方。";
                sdgSlogan.style.display = "block";
                
                updateBearColor('#2d2421'); // 恢復深色
                sceneBg.style.backgroundColor = "#4caf50";
            }

            btnA.style.display = "none";
            btnB.style.display = "none";
            btnReset.style.display = "block";
        }

        function updateBearColor(color) {
            bearBody.style.backgroundColor = color;
            ears.forEach(ear => ear.style.backgroundColor = color);
        }

        function resetStory() {
            storyText.classList.remove('fade-in');
            void storyText.offsetWidth;
            storyText.classList.add('fade-in');
            triggerBubbleAnimation();
            
            // 還原對話與故事內容
            chatBubble.innerText = "「我好餓……森林裡還有食物嗎？」";
            storyText.innerHTML = `
                <p>台灣黑熊「月月」住在美麗的玉山森林裡。</p>
                <p>但是最近森林棲地變得越來越小，月月找不到足夠的食物和藏身處。</p>
                <p>牠肚子好餓好餓，心裡充滿了害怕……該怎麼辦呢？</p>
            `;
            
            sdgSlogan.style.display = "none";
            
            updateBearColor('#2d2421');
            sceneBg.style.backgroundColor = "#81c784";
            
            btnA.style.display = "block";
            btnB.style.display = "block";
            btnReset.style.display = "none";
        }
    </script>
</body>
</html>
